name: "CodeQL – PolyMarket Mimic Trader"

on:
  push:
    branches: [ "main", "claude/**" ]    # match the branches CI actually uses
  pull_request:
    branches: [ "main" ]
  schedule:
    # Every Monday at 03:37 UTC
    - cron: '37 3 * * 1'

jobs:
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest

    permissions:
      security-events: write   # upload SARIF results
      contents: read           # checkout code
      actions: read
      packages: read           # in case we use private CodeQL packs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies (supports either requirements.txt or Poetry)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f poetry.lock ]; then
            pip install poetry
            poetry install --no-root --no-interaction
          else
            echo "No dependency file found. Skipping install."
          fi

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # Use default autobuild for Python (no compilation needed)
          queries: +security-extended,security-and-quality

      # Run the analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
