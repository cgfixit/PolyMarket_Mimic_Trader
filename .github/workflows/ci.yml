name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the GITHUB_TOKEN. Jobs only need to checkout and
# run tests/lint/mypy/audit; they do not write contents or packages.
permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Unit + integration tests ────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Selective pip cache keyed on the exact requirements file so the
          # cache is invalidated whenever a dependency version changes.
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        # Run the full test suite (unit + integration/chaos — all mocked, no live API).
        # Tests marked `integration` require live Polymarket API credentials and are
        # excluded here; add them to a separate nightly job when credentials are available.
        run: |
          pytest -v \
            -m "not integration" \
            --tb=short \
            --cov=polymarket_copier \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() && matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage-${{ matrix.python-version }}.xml
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          retention-days: 14

  # ── Lint + format ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Ruff
        run: pip install ruff

      - name: Run lint gate
        shell: pwsh
        run: ./scripts/check-lint.ps1

  # ── Static type checking ─────────────────────────────────────────────────────
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Type check
        run: mypy polymarket_copier --ignore-missing-imports --no-strict-optional

  # ── Dependency vulnerability audit ──────────────────────────────────────────
  security-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    # Informational: a fresh CVE in a transitive dep shouldn't block merges,
    # but it should be visible on every PR. Set continue-on-error: false once
    # the dependency set is pinned (see requirements.txt).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --desc
